<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTE 55 Tracker MVP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --muted:#94a3b8;
  --accent:#38bdf8;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}
body{
  background:var(--bg);
  color:var(--text);
  padding:20px;
}
.container{
  max-width:1400px;
  margin:auto;
}
h1{
  margin-bottom:10px;
}
.subtitle{
  color:var(--muted);
  margin-bottom:20px;
}
.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-bottom:25px;
}
.card{
  background:var(--card);
  border-radius:12px;
  padding:16px;
}
.label{
  color:var(--muted);
  font-size:12px;
  margin-bottom:8px;
}
.value{
  font-size:32px;
  font-weight:bold;
}
.section{
  background:var(--card);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}
.section h2{
  margin-bottom:15px;
}
.task-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:15px;
}
.task-card{
  background:#111827;
  border-radius:10px;
  padding:15px;
  display: flex;
  flex-direction: column;
}
.task-name{
  font-weight:bold;
  margin-bottom:4px;
}
.task-vi{
  color:var(--muted);
  font-size:13px;
  margin-bottom:10px;
}
.history-logs {
  max-height: 150px;
  overflow-y: auto;
  margin-bottom: 10px;
  font-size: 13px;
}
.history-item {
  padding: 4px 8px;
  background: #1e293b;
  border-radius: 4px;
  margin-bottom: 4px;
  color: var(--muted);
}
.today-input-group {
  margin-top: auto;
}
.today-label {
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 4px;
  display: block;
  font-weight: bold;
}
textarea{
  width:100%;
  min-height:60px;
  background:#020617;
  color:white;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
  resize:vertical;
}
.stats{
  margin-top:10px;
  font-size:14px;
}
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
}
.kpi-card{
  background:#111827;
  border-radius:10px;
  padding:14px;
}
.kpi-title{
  color:var(--muted);
  font-size:12px;
  margin-bottom:6px;
}
.kpi-score{
  font-size:24px;
  font-weight:bold;
  color:var(--accent);
  margin-bottom:4px;
}
.plan-day ul{
  margin-top:10px;
  padding-left:20px;
  line-height:2;
}
.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}
button{
  background:var(--accent);
  color:#0f172a;
  border:none;
  border-radius:8px;
  padding:10px 18px;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}
button:hover{
  opacity:0.85;
}
@media(max-width:700px){
  .dashboard{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="container">

  <h1>PTE 55 MASTER TRACKER</h1>
  <div class="subtitle">PTE Academic Platform • Mục tiêu 55+</div>

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="card">
      <div class="label">Ngày còn lại</div>
      <div class="value" id="daysLeft">0</div>
    </div>
    <div class="card">
      <div class="label">Overall Prediction</div>
      <div class="value" id="overallPrediction">30</div>
    </div>
    <div class="card">
      <div class="label">Tổng Accuracy</div>
      <div class="value" id="overallAccuracy">0%</div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button id="exportJSON">Export JSON</button>
    <button id="importJSON">Import JSON</button>
    <button id="exportCSV">Export CSV</button>
    <button id="resetAll" style="background:#ef4444;color:white;">Reset All</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>

  <!-- Goal Tracker -->
  <div class="section">
    <h2>Goal Tracker</h2>
    <div id="todayKPI" class="kpi-grid"></div>
  </div>

  <!-- Study Plan -->
  <div class="section">
    <h2>Kế hoạch hôm nay</h2>
    <div id="studyPlan"></div>
  </div>

  <!-- Tasks -->
  <div class="section">
    <h2>22 Tasks</h2>
    <div id="taskContainer" class="task-grid"></div>
  </div>

  <!-- Charts -->
  <div class="section" id="historyPanel">
    <h2>Biểu đồ tiến bộ</h2>
    <canvas id="progressChart" height="120"></canvas>
    <br>
    <canvas id="predictionChart" height="120"></canvas>
  </div>

</div>

<script>
// ======================================
// TASKS
// ======================================
const TASKS = [
  ["Read Aloud","Đọc thành tiếng"],
  ["Repeat Sentence","Nhắc lại câu"],
  ["Describe Image","Mô tả hình ảnh"],
  ["Retell Lecture","Kể lại bài giảng"],
  ["Answer Short Question","Trả lời câu hỏi ngắn"],
  ["Summarize Group Discussion","Tóm tắt thảo luận nhóm"],
  ["Respond To Situation","Phản hồi tình huống"],
  ["Summarize Written Text","Tóm tắt văn bản"],
  ["Write Essay","Viết luận"],
  ["Reading MCQ Multiple","Đọc MCQ nhiều đáp án"],
  ["Reading MCQ Single","Đọc MCQ một đáp án"],
  ["Re-order Paragraphs","Sắp xếp đoạn văn"],
  ["Reading & Writing FIB","Điền từ đọc + viết"],
  ["Summarize Spoken Text","Tóm tắt bài nghe"],
  ["Listening MCQ Multiple","Nghe MCQ nhiều đáp án"],
  ["Listening MCQ Single","Nghe MCQ một đáp án"],
  ["Fill In The Blanks","Điền từ bài nghe"],
  ["Highlight Correct Summary","Chọn tóm tắt đúng"],
  ["Select Missing Word","Chọn từ bị thiếu"],
  ["Highlight Incorrect Words","Tô từ sai"],
  ["Write From Dictation","Nghe và viết lại"],
  ["Integrated Practice","Luyện tích hợp"]
];

// ======================================
// DAYS LEFT
// ======================================
const examDate = new Date("2026-07-20");
const diff = Math.ceil((examDate - new Date()) / 86400000);
document.getElementById("daysLeft").innerText = diff;

// ======================================
// HELPERS
// ======================================
function getToday(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${yyyy}-${mm}-${dd}`;
}

function calculateText(text){
  let raw = 0, max = 0;
  if(!text) return { raw, max, accuracy: 0 };
  text.split("\n").map(x=>x.trim()).filter(Boolean).forEach(line=>{
    const match = line.match(/(\d+)\s*\/\s*(\d+)/);
    if(!match) return;
    raw += Number(match[1]);
    max += Number(match[2]);
  });
  const accuracy = max > 0 ? (raw/max)*100 : 0;
  return { raw, max, accuracy };
}

// Tính tổng tất cả các ngày đã lưu cho một task cụ thể
function calculateAllDaysForTask(taskData){
  let raw = 0, max = 0;
  if(!taskData || typeof taskData !== 'object') return { raw, max, accuracy: 0 };
  Object.values(taskData).forEach(text => {
    const res = calculateText(text);
    raw += res.raw;
    max += res.max;
  });
  const accuracy = max > 0 ? (raw/max)*100 : 0;
  return { raw, max, accuracy };
}

function calculatePrediction(overallAccuracy){
  return Math.min(90, 30 + overallAccuracy * 0.35);
}

// ======================================
// STORAGE & MIGRATION (Chuyển đổi dữ liệu cũ nếu có)
// ======================================
function loadData(){
  const raw = localStorage.getItem("pte_mvp_data");
  if(!raw) return {};
  try{ 
    const parsed = JSON.parse(raw);
    // Migration: Nếu dữ liệu cũ lưu dạng chuỗi (String), tự động chuyển sang cấu trúc Object theo ngày
    TASKS.forEach(task => {
      const en = task[0];
      if(parsed[en] && typeof parsed[en] === 'string') {
        const tempText = parsed[en];
        parsed[en] = {};
        parsed[en][getToday()] = tempText; 
      }
    });
    return parsed;
  }
  catch{ return {}; }
}

function saveData(data){
  localStorage.setItem("pte_mvp_data", JSON.stringify(data));
}

const DATA = loadData();
if(!DATA.__history) DATA.__history = [];

// ======================================
// CREATE TASK CARDS
// ======================================
const taskContainer = document.getElementById("taskContainer");
const todayStr = getToday();

TASKS.forEach(task=>{
  const en = task[0];
  const vi = task[1];
  
  if(!DATA[en]) DATA[en] = {};
  const todayText = DATA[en][todayStr] || "";

  // Tạo HTML cho phần lịch sử các ngày cũ
  let historyHTML = "";
  // Sắp xếp các ngày theo thứ tự tăng dần
  const sortedDates = Object.keys(DATA[en]).sort();
  
  sortedDates.forEach(date => {
    if(date !== todayStr) {
      const dayRes = calculateText(DATA[en][date]);
      if(dayRes.max > 0) {
        historyHTML += `<div class="history-item">📅 ${date} &nbsp;&nbsp; [${dayRes.raw}/${dayRes.max}] &nbsp;&nbsp; ✅ ${dayRes.accuracy.toFixed(0)}%</div>`;
      }
    }
  });

  const card = document.createElement("div");
  card.className = "task-card";
  card.innerHTML = `
    <div class="task-name">${en}</div>
    <div class="task-vi">${vi}</div>
    
    <div class="history-logs" id="history_${en}">
      ${historyHTML}
    </div>

    <div class="today-input-group">
      <label class="today-label">📅 ${todayStr} (Hôm nay)</label>
      <textarea id="input_${en}" placeholder="Ví dụ:\n12/24\n15/24">${todayText}</textarea>
    </div>

    <div class="stats" id="stats_${en}">Tổng: 0 / 0 (0%)</div>
  `;
  taskContainer.appendChild(card);
});

// ======================================
// UPDATE ALL
// ======================================
function updateAll(){
  let totalRaw = 0, totalMax = 0;
  const currentToday = getToday();

  TASKS.forEach(task=>{
    const en = task[0];
    const textarea = document.getElementById(`input_${en}`);
    const text = textarea.value;
    
    if(!DATA[en]) DATA[en] = {};
    DATA[en][currentToday] = text;

    // Tính toán dựa trên toàn bộ lịch sử của Task đó
    const result = calculateAllDaysForTask(DATA[en]);
    totalRaw += result.raw;
    totalMax += result.max;

    document.getElementById(`stats_${en}`).innerHTML =
      `Tổng: <b>${result.raw} / ${result.max}</b> &nbsp; (${result.accuracy.toFixed(1)}%)`;
  });

  saveData(DATA);

  const overallAccuracy = totalMax > 0 ? (totalRaw/totalMax)*100 : 0;
  document.getElementById("overallAccuracy").innerText = overallAccuracy.toFixed(1) + "%";

  const prediction = calculatePrediction(overallAccuracy);
  document.getElementById("overallPrediction").innerText = prediction.toFixed(0);

  saveDailySnapshot(overallAccuracy, prediction);
  renderStudyPlan();
  renderGoalTracker();
  renderCharts();
  renderAdvancedGoals();
  generateWeeklyReport();
}

// ======================================
// EVENTS
// ======================================
TASKS.forEach(task=>{
  document.getElementById(`input_${task[0]}`).addEventListener("input", updateAll);
});

// ======================================
// DAILY SNAPSHOT
// ======================================
function saveDailySnapshot(overallAccuracy, prediction){
  if(overallAccuracy === undefined){
    let totalRaw = 0, totalMax = 0;
    TASKS.forEach(task=>{
      const r = calculateAllDaysForTask(DATA[task[0]]);
      totalRaw += r.raw;
      totalMax += r.max;
    });
    overallAccuracy = totalMax > 0 ? (totalRaw/totalMax)*100 : 0;
    prediction = calculatePrediction(overallAccuracy);
  }

  const today = getToday();
  const existing = DATA.__history.find(x=>x.date===today);
  if(existing){
    existing.accuracy = overallAccuracy;
    existing.prediction = prediction;
  } else {
    DATA.__history.push({ date:today, accuracy:overallAccuracy, prediction });
  }
  saveData(DATA);
}

// ======================================
// GOAL TRACKER
// ======================================
function renderGoalTracker(){
  const container = document.getElementById("todayKPI");
  const existingOverall = document.getElementById("kpi-overall");
  const overall = parseFloat(document.getElementById("overallPrediction").innerText);
  const remain = Math.max(0, 55 - overall);
  const html = `
    <div class="kpi-card" id="kpi-overall">
      <div class="kpi-title">Mục tiêu Overall</div>
      <div class="kpi-score">${overall} / 55</div>
      <div>Còn thiếu: ${remain.toFixed(1)} điểm</div>
    </div>
  `;
  if(existingOverall){
    existingOverall.outerHTML = html;
  } else {
    container.insertAdjacentHTML("afterbegin", html);
  }
}

// ======================================
// ADVANCED GOALS
// ======================================
const ADVANCED_GOALS = [
  { name:"Repeat Sentence", target:70 },
  { name:"Write From Dictation", target:70 },
  { name:"Read Aloud", target:75 },
  { name:"Reading & Writing FIB", target:70 },
  { name:"Fill In The Blanks", target:70 }
];

function renderAdvancedGoals(){
  const kpi = document.getElementById("todayKPI");
  kpi.querySelectorAll(".kpi-adv").forEach(el=>el.remove());

  ADVANCED_GOALS.forEach(g=>{
    const result = calculateAllDaysForTask(DATA[g.name]);
    const remain = Math.max(0, g.target - result.accuracy);
    const div = document.createElement("div");
    div.className = "kpi-card kpi-adv";
    div.innerHTML = `
      <div class="kpi-title">${g.name}</div>
      <div class="kpi-score">${result.accuracy.toFixed(1)}%</div>
      <div>Target: ${g.target}%</div>
      <div>Thiếu: ${remain.toFixed(1)}%</div>
    `;
    kpi.appendChild(div);
  });
}

// ======================================
// STUDY PLAN
// ======================================
function renderStudyPlan(){
  const box = document.getElementById("studyPlan");
  const day = new Date().getDay();
  const mode = (day===2 || day===3 || day===5) ? "LIGHT" : "FULL";
  const plan = mode === "LIGHT"
    ? ["Repeat Sentence (20)","Write From Dictation (20)","Read Aloud (15)","Reading & Writing FIB (10)","Fill In The Blanks (10)"]
    : ["Repeat Sentence (40)","Write From Dictation (40)","Read Aloud (30)","Reading & Writing FIB (25)","Fill In The Blanks (25)","Describe Image (15)","Retell Lecture (10)"];

  box.innerHTML = `
    <div class="plan-day">
      <p>Chế độ: <b>${mode}</b></p>
      <ul>${plan.map(x=>`<li>${x}</li>`).join("")}</ul>
    </div>
  `;
}

// ======================================
// CHARTS
// ======================================
let progressChart = null;
let predictionChart = null;

function renderCharts(){
  if(!DATA.__history || DATA.__history.length === 0) return;
  const labels = DATA.__history.map(x=>x.date);
  const accuracyData = DATA.__history.map(x=>Number(x.accuracy.toFixed(1)));
  const predictionData = DATA.__history.map(x=>Number(x.prediction.toFixed(1)));

  const ctx1 = document.getElementById("progressChart").getContext("2d");
  if(progressChart) progressChart.destroy();
  progressChart = new Chart(ctx1,{
    type:"line",
    data:{ labels, datasets:[{ label:"Accuracy %", data:accuracyData, tension:0.3, borderColor:"#38bdf8", backgroundColor:"rgba(56,189,248,0.1)" }] },
    options:{ responsive:true, plugins:{ legend:{ display:true } } }
  });

  const ctx2 = document.getElementById("predictionChart").getContext("2d");
  if(predictionChart) predictionChart.destroy();
  predictionChart = new Chart(ctx2,{
    type:"line",
    data:{ labels, datasets:[{ label:"Overall Prediction", data:predictionData, tension:0.3, borderColor:"#a78bfa", backgroundColor:"rgba(167,139,250,0.1)" }] },
    options:{ responsive:true, plugins:{ legend:{ display:true } } }
  });
}

// ======================================
// WEEKLY REPORT
// ======================================
function generateWeeklyReport(){
  if(!DATA.__history || DATA.__history.length < 2) return;
  const first = DATA.__history[0];
  const last = DATA.__history[DATA.__history.length-1];
  const improve = last.prediction - first.prediction;
  console.log("Weekly Progress:", improve.toFixed(1), "points");
}

// ======================================
// EXPORT / IMPORT / RESET
// ======================================
document.getElementById("exportJSON").addEventListener("click",()=>{
  const blob = new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "pte_tracker_backup.json";
  a.click();
});

document.getElementById("importJSON").addEventListener("click",()=>{
  document.getElementById("importFile").click();
});

document.getElementById("importFile").addEventListener("change",e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const imported = JSON.parse(reader.result);
      Object.keys(imported).forEach(k=>{ DATA[k] = imported[k]; });
      saveData(DATA);
      location.reload();
    } catch(err){
      alert("File JSON không hợp lệ!");
    }
  };
  reader.readAsText(file);
});

document.getElementById("exportCSV").addEventListener("click",()=>{
  let csv = "Task,Date,Raw,Max,Accuracy\n";
  TASKS.forEach(task=>{
    const name = task[0];
    if(DATA[name] && typeof DATA[name] === 'object'){
      Object.keys(DATA[name]).forEach(date => {
        const result = calculateText(DATA[name][date]);
        csv += `"${name}","${date}",${result.raw},${result.max},${result.accuracy.toFixed(2)}\n`;
      });
    }
  });
  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "pte_scores_by_date.csv";
  a.click();
});

document.getElementById("resetAll").addEventListener("click",()=>{
  if(!confirm("Xóa toàn bộ dữ liệu?")) return;
  localStorage.removeItem("pte_mvp_data");
  location.reload();
});

// ======================================
// INIT
// ======================================
updateAll();
</script>
</body>
</html>
